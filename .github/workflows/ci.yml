name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs when a new commit is pushed to the same PR/branch.
# Saves CI minutes on rapid successive pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Quality gate — runs on every push and PR
  # ============================================================
  quality:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript typecheck
        run: pnpm typecheck

      - name: ESLint
        run: pnpm lint

  # ============================================================
  # Build — full production build with Postgres service running
  # so Payload can initialize its schema during static generation.
  # ============================================================
  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cad
          POSTGRES_PASSWORD: cad
          POSTGRES_DB: cad
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U cad; then
              echo "Postgres is ready"
              break
            fi
            sleep 1
          done

      - name: Build (Next.js + Payload)
        run: pnpm build
        env:
          DATABASE_URI: postgres://cad:cad@localhost:5432/cad
          PAYLOAD_SECRET: ci-secret-placeholder-32-bytes-long-enough
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          PAYLOAD_PUBLIC_SERVER_URL: http://localhost:3000
          # S3 / R2 not required for CI build — Payload skips media storage gracefully
          S3_ENDPOINT: ''
          S3_BUCKET: ''
          S3_ACCESS_KEY_ID: ''
          S3_SECRET_ACCESS_KEY: ''
          S3_REGION: auto

  # ============================================================
  # Tests — optional, runs only if tests exist. Non-blocking.
  # ============================================================
  test:
    name: Tests (unit)
    runs-on: ubuntu-latest
    needs: quality
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Vitest
        run: pnpm test --run --passWithNoTests
